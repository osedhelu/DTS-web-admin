# Railway — deploy del submódulo web-admin (repo standalone)
# Guía: DEPLOY_RAILWAY.md
#
# En Railway: conecta el repo del submódulo web-admin, Root Directory = /

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**/*.ts", "**/*.tsx", "package.json", "package-lock.json"]

[deploy]
healthcheckPath = "/login"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
